services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minicrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minicrm}
      POSTGRES_DB: ${POSTGRES_DB:-minicrm}
    # volume NOMEADO: bind mount de pgdata quebra no Windows/NTFS
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-minicrm} -d ${POSTGRES_DB:-minicrm}']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-minicrm}:${POSTGRES_PASSWORD:-minicrm}@db:5432/${POSTGRES_DB:-minicrm}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_SERVICE_ACCOUNT_PATH: ./secrets/firebase-service-account.json
      WA_SESSION_DIR: ./sessions
      SEED_USER_MATRIZ_EMAIL: ${SEED_USER_MATRIZ_EMAIL}
      SEED_USER_FILIAL_EMAIL: ${SEED_USER_FILIAL_EMAIL}
    volumes:
      # sessões Baileys em volume nomeado — sobrevivem a rebuild/restart
      - wa-sessions:/app/sessions
      # service account montado read-only a partir da pasta gitignored
      - ./apps/api/secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  wa-sessions:
